<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-issue-tracker | Home</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- taliwind and daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- main style -->
    <link rel="stylesheet" href="./style.css">
</head>

<body class="">
    <!-- header section -->
    <header>
        <div class="navbar bg-base-100 shadow-sm px-20">
            <div class="flex gap-2 items-center flex-1">
                <img src="./assets/github-logo.png" alt="" class="w-12">
                <a class="text-2xl font-semibold">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <label class="input outline-0">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input class="" type="search" required placeholder="Search Issues" />
                </label>
                <button class="btn btn-primary">+ New Issue</button>
            </div>
        </div>
    </header>
    <main class="bg-red-300 min-h-screen pt-15">
        <section class="btns w-10/12 mx-auto space-x-2 p-8 rounded-lg bg-white">
            <button class="btn btn-primary">All</button>
            <button class="btn btn-soft text-[#64748B]">Open</button>
            <button class="btn btn-soft text-[#64748B]">Close</button>
        </section>

        <section class="w-10/12 mx-auto p-8 rounded-lg bg-white mt-5">
            <div class="issue flex justify-between items-center">
                <div class="left flex gap-2">
                    <div class="img-container p-2 rounded-full bg-blue-100 w-12 h-12">
                        <img class="w-full" src="./assets/Aperture.png" alt="">
                    </div>
                    <div class="text">
                        <h3 class="text-xl font-semibold text-neutral-700">50 Issues</h3>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="right flex items-center gap-4">
                    <div class="flex gap-2 items-center">
                        <div class="w-2.5 h-2.5 rounded-full bg-green-500"></div>
                        <span>Open</span>
                    </div>
                    <div class="flex gap-2 items-center">
                        <div class="w-2.5 h-2.5 rounded-full bg-red-500"></div>
                        <span>Close</span>
                    </div>

                </div>
            </div>
        </section>
    </main>
</body>

</html>
