<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-issue-tracker | Login</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- taliwind and daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- main style -->
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-gray-100 min-h-screen flex justify-center items-center">
    <div class="bg-white card card-body shadow-xl rounded-xl w-full max-w-md h-[87vh] mx-auto">
        <div class="p-4">
            <div class="text-center space-y-2">
                <img src="./assets/github-logo.png" alt="" class="mx-auto">
                <h2 class="text-3xl font-semibold mt-8">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>

            <!-- form -->
            <div class="space-y-6">
                <div>
                    <label for="username" class="font-semibold">Username</label><br>
                    <input id="username" type="text" placeholder="Enter Username" class="input w-full mt-1 outline-0" />
                </div>
                <div>
                    <label for="password" class="font-semibold">Password</label><br>
                    <input id="password" type="text" placeholder="Enter Pssoword" class="input w-full mt-1 outline-0" />
                </div>
                <button id="btn-sign-in" class="btn btn-primary w-full">Sign In</button>
            </div>

            <!-- for hr -->
            <div class="my-10 flex items-center">
                <div class="grow border-b border-gray-300"></div>
                <span class="mx-4 font-semibold text-[#64748B]">OR</span>
                <div class="grow border-b border-gray-300"></div>
            </div>

            <p class="text-[#64748B] text-lg text-center">Demo Credentials:</p>

            <div class="bg-gray-100 p-8 rounded-xl text-center">
                <p><span class="font-semibold">Username:</span> admin</p>
                <p><span class="font-semibold">Password:</span> admin123</p>
            </div>
        </div>
    </div>

    <script src="./Js/login.js"></script>
</body>

</html>
